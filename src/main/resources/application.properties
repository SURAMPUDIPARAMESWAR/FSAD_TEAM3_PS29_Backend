# ===============================
# APPLICATION
# ===============================
spring.application.name=student-system

# Render dynamic port (fallback for local)
server.port=${PORT:1234}

# ===============================
# DATABASE (Railway MySQL)
# ===============================

# Use Railway environment variables directly
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===============================
# SERVER / PROXY (Render)
# ===============================
server.forward-headers-strategy=framework

# ===============================
# LOGGING (optional)
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF